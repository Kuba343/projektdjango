{% extends "admin/base_site.html" %}
{% block content %}
<form action="" method="post">
    {% csrf_token %}
    <p>{{ title }}</p>
    {{ form.as_p }}
    
    {% for obj in items %}
        <input type="hidden" name="_selected_action" value="{{ obj.pk }}" />
    {% endfor %}
    
    <input type="hidden" name="action" value="zmien_cene_procentowo" />
    <input type="submit" name="apply" value="Zastosuj zmiany w bazie (SQL)" />
</form>
{% endblock %}
