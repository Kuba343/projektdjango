<!DOCTYPE html>
{% load static %}
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'Podstrony.css' %}?v=1.1">
    <title>{% block title %}Żyd🚗Rent{% endblock %}</title>
</head>

<body>
    <nav class="navbar">
        <a href="{% url 'home' %}" class="logo-image">
            <img src="{% static 'images/logo.png' %}" alt="Logo MV-RENT">
        </a>
        <div class="nav-links">
            <a href="{% url 'home' %}">Strona Główna</a>
            <a href="{% url 'car_list' %}">Flota</a>
            <a href="{% url 'about' %}">O nas</a>
            <a href="{% url 'calculator' %}">Kalkulator</a>
            <a href="{% url 'contact' %}">Kontakt</a>
        </div>

        <div class="user-section">
            {% if user.is_authenticated %}
                <div class="dropdown">
                    <button class="dropbtn" type="button">👤 {{ user.username }}</button>
                    <div class="dropdown-content">
                        <a href="#">Dane konta</a>
                        <a href="#">Wprowadź prawo jazdy</a>
                        <hr>
                        <form action="{% url 'logout' %}" method="post" style="margin: 0; padding: 0;">
                            {% csrf_token %}
                            <button type="submit" class="logout-btn">Wyloguj się</button>
                        </form>
                    </div>
                </div>
            {% else %}
                <a href="{% url 'login' %}" class="login-link">👤 Zaloguj się</a>
            {% endif %}
        </div>
    </nav>

    <main>
        {% block content %}
        {% endblock %}
    </main>

</body>
</html>
