<!DOCTYPE html>
{% load static %}
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'StronaG.css' %}">
    <title>{% block title %}Żyd🚗Rent{% endblock %}</title>
</head>

<body>
    <div class="navbar">
        <a href="{% url 'home' %}" class="logo">
            <div class="logo-main">Żyd🚗Rent</div>
        </a>

        <div>
            <a href="{% url 'home' %}">Strona Główna</a>
            <a href="{% url 'car_list' %}">Flota</a>
            <a href="{% url 'about' %}">O nas</a>
            <a href="{% url 'calculator' %}">Kalkulator</a>
            <a href="{% url 'mail' %}">Wyślij maila</a>
            <a href="{% url 'contact' %}">Kontakt</a>
        </div>
            <div class="user-section">
            {% if user.is_authenticated %}
                <div class="dropdown">
                    <button class="dropbtn">👤 {{ user.username }}</button>
                    <div class="dropdown-content">
                        <a href="#">Dane konta</a>
                        <a href="#">Wprowadź prawo jazdy</a>
                        <hr>
                        <form action="{% url 'logout' %}" method="post">
                            {% csrf_token %}
                            <button type="submit">Wyloguj się</button>
                        </form>
                    </div>
                </div>
            {% else %}
                <a href="{% url 'login' %}" class="login-link">👤 Zaloguj się</a>
            {% endif %}
        </div>
    </div>

    {% block content %}
    {% endblock %}
</body>
</html>
