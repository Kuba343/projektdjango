{% extends 'base.html' %}
{% block content %}
<div class="container mt-5">
    <h2>Podsumowanie zamówienia: {{ car.brand }} {{ car.model }}</h2>
    <div class="row">
        <div class="col-md-8">
            <p><strong>Termin:</strong> {{ start_date }} - {{ end_date }}</p>
            <form method="POST" action="{% url 'payment_pending' rental.id %}">
                {% csrf_token %}
                <h4>Wybierz dodatki:</h4>
                {% for addon in addons %}
                <div class="form-check mb-2">
                    <input class="form-check-input addon-checkbox" type="checkbox" name="addons" value="{{ addon.id }}" data-price="{{ addon.daily_price }}">
                    <label class="form-check-label">
                        {{ addon.name }} (+{{ addon.daily_price }} zł/doba)
                    </label>
                </div>
                {% endfor %}

                <hr>
                <div class="alert alert-info">
                    <h4>Suma: <span id="final-price">{{ rental.total_price }}</span> zł</h4>
                </div>

                <button type="submit" class="btn btn-success btn-lg w-100">Zapłać BLIKiem</button>
                <a href="{% url 'rent_page' %}" class="btn btn-outline-danger w-100 mt-2">Anuluj i wróć</a>
            </form>
        </div>
    </div>
</div>

<script>
    // Prosta logika JS do aktualizacji ceny na żywo
    const checkboxes = document.querySelectorAll('.addon-checkbox');
    const priceSpan = document.getElementById('final-price');
    let basePrice = parseFloat("{{ rental.total_price }}");

    checkboxes.forEach(cb => {
        cb.addEventListener('change', () => {
            let extra = 0;
            checkboxes.forEach(c => {
                if(c.checked) extra += parseFloat(c.dataset.price);
            });
            priceSpan.innerText = (basePrice + extra).toFixed(2);
        });
    });
</script>
{% endblock %}
